<mat-toolbar class="ns-toolbar topbar">
  <button mat-icon-button class="menu-btn" (click)="menuToggle.emit()">
    <mat-icon>menu</mat-icon>
  </button>

  <div class="topbar-brand">
    <span class="brand-gradient">NightShift</span>
    <span class="brand-suffix">&nbsp;Portal</span>
  </div>

  <span class="spacer"></span>

  <ng-container *ngIf="accountContext$ | async as context">
    <span class="role-badge" *ngIf="context.roleLabel">{{ context.roleLabel }}</span>
    <span class="tier-badge" *ngIf="context.tierLabel" [class.pro]="context.tier === 'pro'">
      {{ context.tierLabel }}
    </span>
  </ng-container>

  <a mat-icon-button routerLink="/notifications" aria-label="Notifiche">
    <mat-icon>notifications</mat-icon>
  </a>
</mat-toolbar>
