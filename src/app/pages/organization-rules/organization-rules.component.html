<div class="page-container">
  <div class="page-header">
    <div class="header-row">
      <div><h1>Regole organizzazione</h1><p>Contratto e norme interne</p></div>
      <button mat-raised-button color="primary" (click)="startAdd()">
        <mat-icon>add</mat-icon> Nuova regola
      </button>
    </div>
  </div>

  <mat-card class="ns-card form-card" *ngIf="showForm">
    <mat-card-header><mat-card-title>{{ editingRule ? 'Modifica' : 'Nuova' }} regola</mat-card-title></mat-card-header>
    <mat-card-content>
      <div class="form-col">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nome regola</mat-label>
          <input matInput [(ngModel)]="draftName" placeholder="Es. Orario minimo turno">
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Descrizione</mat-label>
          <textarea matInput rows="3" [(ngModel)]="draftDescription" placeholder="Descrivi la regola..."></textarea>
        </mat-form-field>
      </div>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-button (click)="cancelForm()">Annulla</button>
      <button mat-raised-button color="primary" [disabled]="isSaving" (click)="saveRule()">
        <mat-spinner *ngIf="isSaving" diameter="18"></mat-spinner>
        <span *ngIf="!isSaving">Salva</span>
      </button>
    </mat-card-actions>
  </mat-card>

  <div class="loading-overlay" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>

  <div class="no-data" *ngIf="!isLoading && rules.length === 0">
    <mat-icon>rule</mat-icon><p>Nessuna regola configurata</p>
  </div>

  <mat-card class="ns-card table-card" *ngIf="!isLoading && rules.length > 0">
    <mat-card-content>
      <table mat-table [dataSource]="rules" class="full-width">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nome</th>
          <td mat-cell *matCellDef="let rule"><strong>{{ rule.ruleOrException }}</strong></td>
        </ng-container>
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Descrizione</th>
          <td mat-cell *matCellDef="let rule">{{ rule.ruleOrExceptionDescription }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let rule" class="actions-cell">
            <button mat-icon-button (click)="startEdit(rule)"><mat-icon>edit</mat-icon></button>
            <button mat-icon-button color="warn" (click)="deleteRule(rule)"><mat-icon>delete</mat-icon></button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
