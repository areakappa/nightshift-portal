<div class="auth-page">
  <div class="auth-left">
    <div class="brand-banner">
      <div class="brand-logo">NS</div>
      <h1 class="brand-title">NightShift</h1>
      <p class="brand-subtitle">Recupera la tua password</p>
    </div>
  </div>

  <div class="auth-right">
    <mat-card class="auth-card">
      <mat-card-header>
        <mat-card-title>Password dimenticata</mat-card-title>
        <mat-card-subtitle>Inserisci la tua email per ricevere le istruzioni</mat-card-subtitle>
      </mat-card-header>

      <mat-card-content>
        <div class="success-banner" *ngIf="sent">
          <mat-icon>check_circle</mat-icon>
          Email inviata! Controlla la tua casella di posta.
        </div>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input matInput [formControl]="email" type="email" placeholder="nome@esempio.com" (keyup.enter)="submitRecoveryEmail()">
          <mat-error *ngIf="email.hasError('required')">Email obbligatoria</mat-error>
          <mat-error *ngIf="email.hasError('email')">Email non valida</mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" class="full-width submit-btn"
          (click)="submitRecoveryEmail()" [disabled]="submitProcess || email.invalid">
          <mat-spinner *ngIf="submitProcess" diameter="20" color="accent"></mat-spinner>
          <span *ngIf="!submitProcess">Invia istruzioni</span>
        </button>

        <div class="back-link">
          <a class="link" (click)="back()">
            <mat-icon inline>arrow_back</mat-icon> Torna al login
          </a>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
