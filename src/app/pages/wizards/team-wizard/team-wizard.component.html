<div class="page-container wizard-container">
  <div class="wizard-header">
    <button mat-icon-button (click)="cancel()"><mat-icon>close</mat-icon></button>
    <h1>Wizard Team</h1>
  </div>

  <div class="loading-overlay" *ngIf="isLoading"><mat-spinner diameter="40"></mat-spinner></div>

  <mat-stepper linear *ngIf="!isLoading">
    <!-- Step 1: Selezione servizio -->
    <mat-step label="Seleziona servizio">
      <div class="step-content">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Servizio</mat-label>
          <mat-select [(ngModel)]="selectedServiceId" (ngModelChange)="onServiceSelected()">
            <mat-option *ngFor="let svc of services" [value]="svc.id">{{ svc.name }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="step-actions">
        <button mat-raised-button color="primary" matStepperNext [disabled]="!selectedServiceId || roles.length === 0">Avanti</button>
      </div>
    </mat-step>

    <!-- Step 2: Assegnazione ruoli -->
    <mat-step label="Assegna utenti ai ruoli">
      <div class="step-content">
        <div class="role-section" *ngFor="let role of roles">
          <h3>{{ role.name }}</h3>
          <div class="users-for-role">
            <div class="user-chip" *ngFor="let user of users"
              [class.assigned]="isAssigned(role.id, user.id!)"
              (click)="toggleUserRole(role.id, user.id!)">
              <mat-icon>{{ isAssigned(role.id, user.id!) ? 'check_circle' : 'radio_button_unchecked' }}</mat-icon>
              {{ getUserLabel(user) }}
            </div>
          </div>
        </div>
      </div>
      <div class="step-actions">
        <button mat-button matStepperPrevious>Indietro</button>
        <button mat-raised-button color="primary" matStepperNext (click)="saveAssignments()" [disabled]="isSaving">
          <mat-spinner *ngIf="isSaving" diameter="18"></mat-spinner>
          <span *ngIf="!isSaving">Salva assegnazioni</span>
        </button>
      </div>
    </mat-step>

    <!-- Step 3: Fine -->
    <mat-step label="Completato">
      <div class="step-content done-step">
        <mat-icon class="done-icon">check_circle</mat-icon>
        <h2>Team configurato!</h2>
      </div>
      <div class="step-actions">
        <button mat-raised-button color="primary" (click)="finish()">Vai al team</button>
      </div>
    </mat-step>
  </mat-stepper>
</div>
